name = "chittymcp-gateway"
main = "src/index.js"
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Account ID
account_id = "0bc21e3a5a9de1a4cc843be9c3e98121"

# Service bindings — same-zone Workers cannot be reached by URL fetch on routes.
# All inter-service calls MUST go through these bindings.
[[services]]
binding = "SVC_CHITTYID"
service = "chittyid"

[[services]]
binding = "SVC_CHITTYAUTH"
service = "chittyauth"

[[services]]
binding = "SVC_CHITTYCONNECT"
service = "chittyconnect"

[[services]]
binding = "SVC_CHITTYROUTER"
service = "chittyrouter"

[[services]]
binding = "SVC_CHITTYREGISTRY"
service = "chittyregistry"

# Staging environment
# NOTE: Cloudflare named environments do NOT inherit top-level [[services]],
# [[kv_namespaces]], or [[d1_databases]] — they must be re-declared per env.
[env.staging]

[env.staging.vars]
MCP_VERSION = "2024-11-05"
CORS_ORIGINS = "https://chat.openai.com,https://chatgpt.com"

[[env.staging.services]]
binding = "SVC_CHITTYID"
service = "chittyid"

[[env.staging.services]]
binding = "SVC_CHITTYAUTH"
service = "chittyauth"

[[env.staging.services]]
binding = "SVC_CHITTYCONNECT"
service = "chittyconnect"

[[env.staging.services]]
binding = "SVC_CHITTYROUTER"
service = "chittyrouter"

[[env.staging.services]]
binding = "SVC_CHITTYREGISTRY"
service = "chittyregistry"

[[env.staging.routes]]
pattern = "mcp-chatgpt-staging.chitty.cc/*"
zone_name = "chitty.cc"

# Production environment
[env.production]

[env.production.vars]
MCP_VERSION = "2024-11-05"
CORS_ORIGINS = "https://chat.openai.com,https://chatgpt.com"

[[env.production.services]]
binding = "SVC_CHITTYID"
service = "chittyid"

[[env.production.services]]
binding = "SVC_CHITTYAUTH"
service = "chittyauth"

[[env.production.services]]
binding = "SVC_CHITTYCONNECT"
service = "chittyconnect"

[[env.production.services]]
binding = "SVC_CHITTYROUTER"
service = "chittyrouter"

[[env.production.services]]
binding = "SVC_CHITTYREGISTRY"
service = "chittyregistry"

# Own hostname — does NOT conflict with mcp.chitty.cc (owned by chittyconnect)
[[env.production.routes]]
pattern = "mcp-chatgpt.chitty.cc/*"
zone_name = "chitty.cc"

# Environment variables (non-secret)
[vars]
MCP_VERSION = "2024-11-05"
CORS_ORIGINS = "https://chat.openai.com,https://chatgpt.com"

# Required secrets (set with: wrangler secret put SECRET_NAME)
# NEON_DATABASE_URL - Neon PostgreSQL connection string
# MCP_API_KEY - API key for ChatGPT MCP connector authentication
# OAUTH_CLIENT_ID - OAuth client ID (required — no public mode fallback)
# OAUTH_CLIENT_SECRET - OAuth client secret

# Observability
[observability]
enabled = true

# ChittyTrack observability
[[tail_consumers]]
service = "chittytrack"
